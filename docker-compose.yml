services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    ports:
      - "8000:80"
    volumes:
      - ./public:/var/www/html
      - ./src:/var/www/src 
    environment:
      - DB_HOST=db
      - DB_NAME=${DB_NAME:-capus_craves}
      - DB_USER=${DB_USER:-capus_user}
      - DB_PASSWORD=${DB_PASSWORD:-your_secure_user_password}
      - DB_TYPE=pgsql
    depends_on:
      - db
    networks:
      - steampunk_network
    restart: unless-stopped

  db:
    image: postgres:15
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-capus_craves}
      POSTGRES_USER: ${DB_USER:-capus_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-your_secure_user_password}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./postgresql-init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - steampunk_network
    restart: unless-stopped

  adminer:
    image: adminer
    ports:
      - "127.0.0.1:8081:8080"
    depends_on:
      - db
    networks:
      - steampunk_network
    restart: unless-stopped

networks:
  steampunk_network:
    driver: bridge

volumes:
  db_data: